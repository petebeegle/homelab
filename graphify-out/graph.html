  .legend-item:hover { background: #2a2a4e; padding-left: 4px; }
  .legend-item.dimmed { opacity: 0.35; }

  _source_file: n.source_file, _file_type: n.file_type, _degree: n.degree,
})));

const edgesDS = new vis.DataSet(RAW_EDGES.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  label: '',
  title: e.title,
  dashes: e.dashes,
  width: e.width,
  color: e.color,
  arrows: { to: { enabled: true, scaleFactor: 0.5 } },
})));

const container = document.getElementById('graph');
const network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, {
  physics: {
    enabled: true,
    solver: 'forceAtlas2Based',
    forceAtlas2Based: {
      gravitationalConstant: -60,
      centralGravity: 0.005,
      springLength: 120,
      springConstant: 0.08,
      damping: 0.4,
      avoidOverlap: 0.8,
    },
    stabilization: { iterations: 200, fit: true },
  },
  interaction: {
    hover: true,
    tooltipDelay: 100,
    hideEdgesOnDrag: true,
    navigationButtons: false,
    keyboard: false,
  },
  nodes: { shape: 'dot', borderWidth: 1.5 },
  edges: { smooth: { type: 'continuous', roundness: 0.2 }, selectionWidth: 3 },
});

network.once('stabilizationIterationsDone', () => {
  network.setOptions({ physics: { enabled: false } });
});

function showInfo(nodeId) {
  const n = nodesDS.get(nodeId);
  if (!n) return;
  const neighborIds = network.getConnectedNodes(nodeId);
  const neighborItems = neighborIds.map(nid => {
    const nb = nodesDS.get(nid);
    const color = nb ? nb.color.background : '#555';
    return `<span class="neighbor-link" style="border-left-color:${esc(color)}" onclick="focusNode(${JSON.stringify(nid)})">${esc(nb ? nb.label : nid)}</span>`;
  }).join('');
  document.getElementById('info-content').innerHTML = `
    <div class="field"><b>${esc(n.label)}</b></div>
    <div class="field">Type: ${esc(n._file_type || 'unknown')}</div>
    <div class="field">Community: ${esc(n._community_name)}</div>
    <div class="field">Source: ${esc(n._source_file || '-')}</div>
    <div class="field">Degree: ${n._degree}</div>
    ${neighborIds.length ? `<div class="field" style="margin-top:8px;color:#aaa;font-size:11px">Neighbors (${neighborIds.length})</div><div id="neighbors-list">${neighborItems}</div>` : ''}
  `;
}

function focusNode(nodeId) {
  network.focus(nodeId, { scale: 1.4, animation: true });
  network.selectNodes([nodeId]);
  showInfo(nodeId);
}

// Track hovered node — hover detection is more reliable than click params
let hoveredNodeId = null;
network.on('hoverNode', params => {
  hoveredNodeId = params.node;
  container.style.cursor = 'pointer';
});
network.on('blurNode', () => {
  hoveredNodeId = null;
  container.style.cursor = 'default';
});
container.addEventListener('click', () => {
  if (hoveredNodeId !== null) {
    showInfo(hoveredNodeId);
    network.selectNodes([hoveredNodeId]);
  }
});
network.on('click', params => {
  if (params.nodes.length > 0) {
    showInfo(params.nodes[0]);
  } else if (hoveredNodeId === null) {
    document.getElementById('info-content').innerHTML = '<span class="empty">Click a node to inspect it</span>';
  }
});

const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  searchResults.innerHTML = '';
  if (!q) { searchResults.style.display = 'none'; return; }
  const matches = RAW_NODES.filter(n => n.label.toLowerCase().includes(q)).slice(0, 20);
  if (!matches.length) { searchResults.style.display = 'none'; return; }
  searchResults.style.display = 'block';
  matches.forEach(n => {
    const el = document.createElement('div');
    el.className = 'search-item';
    el.textContent = n.label;
    el.style.borderLeft = `3px solid ${n.color.background}`;
    el.style.paddingLeft = '8px';
    el.onclick = () => {
      network.focus(n.id, { scale: 1.5, animation: true });
      network.selectNodes([n.id]);
      showInfo(n.id);
      searchResults.style.display = 'none';
      searchInput.value = '';
    };
    searchResults.appendChild(el);
  });
});
document.addEventListener('click', e => {
  if (!searchResults.contains(e.target) && e.target !== searchInput)
    searchResults.style.display = 'none';
});

const hiddenCommunities = new Set();

const selectAllCb = document.getElementById('select-all-cb');

function updateSelectAllState() {
  const total = LEGEND.length;
  const hidden = hiddenCommunities.size;
  selectAllCb.checked = hidden === 0;
  selectAllCb.indeterminate = hidden > 0 && hidden < total;
}

function toggleAllCommunities(hide) {
  document.querySelectorAll('.legend-item').forEach(item => {
    hide ? item.classList.add('dimmed') : item.classList.remove('dimmed');
  });
  document.querySelectorAll('.legend-cb').forEach(cb => {
    cb.checked = !hide;
  });
  LEGEND.forEach(c => {
    if (hide) hiddenCommunities.add(c.cid); else hiddenCommunities.delete(c.cid);
  });
  const updates = RAW_NODES.map(n => ({ id: n.id, hidden: hide }));
  nodesDS.update(updates);
  updateSelectAllState();
}

const legendEl = document.getElementById('legend');
LEGEND.forEach(c => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.className = 'legend-cb';
  cb.checked = true;
  cb.addEventListener('change', (e) => {
    e.stopPropagation();
    if (cb.checked) {
      hiddenCommunities.delete(c.cid);
      item.classList.remove('dimmed');
    } else {
      hiddenCommunities.add(c.cid);
      item.classList.add('dimmed');
    }
    const updates = RAW_NODES
      .filter(n => n.community === c.cid)
      .map(n => ({ id: n.id, hidden: !cb.checked }));
    nodesDS.update(updates);
    updateSelectAllState();
  });
  item.innerHTML = `<div class="legend-dot" style="background:${c.color}"></div>
    <span class="legend-label">${c.label}</span>
    <span class="legend-count">${c.count}</span>`;
  item.prepend(cb);
  item.onclick = (e) => {
    if (e.target === cb) return;
    cb.checked = !cb.checked;
    cb.dispatchEvent(new Event('change'));
  };
  legendEl.appendChild(item);
});
</script>

ndle: nfs-csi, cert-manager, grafana-operator", "nodes": ["controllers_kustomization", "nfs_csi_kustomization", "certmanager_kustomization", "grafana_operator_kustomization_infra"], "relation": "bundled_controller_group", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "kubernetes/infra/controllers/kustomization.yaml"}, {"id": "certs_dependency_chain", "label": "certs Flux Kustomization depends on both cert-manager and cilium before applying", "nodes": ["certs_kustomization", "certmanager_app", "cluster_vars_configmap"], "relation": "flux_dependency_chain", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "kubernetes/clusters/production/infra/certs.yaml"}, {"id": "hyperedge_crds_bundle", "label": "CRDs Bundle: external-snapshotter + gateway-api + grafana-operator-crds + prometheus-crds", "nodes": ["crds_kustomization", "crds_grafana_app", "crds_prometheus_app", "crds_external_snapshotter", "crds_gateway_api"], "relation": "forms_crds_layer", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "kubernetes/infra/crds/kustomization.yaml"}, {"id": "hyperedge_alloy_config_pipeline", "label": "Alloy config pipeline: kustomization generates ConfigMap mounted by HelmRelease", "nodes": ["alloy_kustomization", "alloy_configmap", "alloy_app"], "relation": "configmap_generation_and_mount_pipeline", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "kubernetes/infra/monitoring/alloy/kustomization.yaml"}, {"id": "hyperedge_grafana_operator_pattern", "label": "Grafana operator pattern: Grafana CR + GrafanaFolders managed via instanceSelector label", "nodes": ["grafana_instance", "grafana_folders", "crds_grafana_app"], "relation": "grafana_operator_management_pattern", "confidence": "EXTRACTED", "confidence_score": 0.95, "source_file": "kubernetes/infra/monitoring/grafana/grafana-instance.yaml"}, {"id": "hyperedge_flux_observability_pipeline", "label": "Flux Observability Pipeline: ksm CRD metrics -> Mimir -> Grafana alert rules", "nodes": ["ksm_app_helmrelease", "ksm_gotk_resource_info_metric", "alerting_flux_alert_rule_group", "app_grafana_datasource_prometheus", "app_grafana_contactpoint_discord"], "relation": "observability_pipeline", "confidence": "INFERRED", "confidence_score": 0.85, "source_file": "kubernetes/infra/monitoring/kube-state-metrics/config/metrics.yaml"}, {"id": "hyperedge_grafana_dashboards_operator_pattern", "label": "Grafana Operator dashboard provisioning pattern: GrafanaDashboard CRDs loaded from ConfigMap JSON", "nodes": ["dashboards_kustomization_dashboards", "dashboards_flux_dashboard", "dashboards_kubernetes_dashboard", "dashboards_proxmox_dashboard", "dashboards_authentik_dashboard"], "relation": "dashboard_provisioning_pattern", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "kubernetes/infra/monitoring/grafana/dashboards/kustomization.yaml"}, {"id": "hyperedge_loki_simple_scalable_deployment", "label": "Loki SimpleScalable deployment: backend+read+write replicas + minio storage", "nodes": ["loki_app_helmrelease", "loki_simple_scalable_mode", "loki_minio_storage", "loki_namespace"], "relation": "deployment_topology", "confidence": "EXTRACTED", "confidence_score": 0.95, "source_file": "kubernetes/infra/monitoring/loki/app.yaml"}, {"id": "hyperedge_snmp_monitoring_pipeline", "label": "SNMP Monitoring Pipeline for Synology NAS", "nodes": ["snmp_exporter_deployment", "snmp_exporter_service", "snmp_exporter_servicemonitor", "synology_nas_target"], "relation": "forms_snmp_monitoring_pipeline", "confidence": "EXTRACTED", "confidence_score": 0.95, "source_file": "kubernetes/infra/monitoring/snmp-exporter/servicemonitor.yaml"}, {"id": "hyperedge_cert_issuers_cloudflare_dns01", "label": "Cloudflare DNS-01 Certificate Issuers (prod + staging)", "nodes": ["certs_issuer_cloudflare", "certs_issuer_cloudflare_staging", "cloudflare_api_token_secret"], "relation": "share_cloudflare_dns01_solver", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "kubernetes/infra/network/certs/issuer.yaml"}, {"id": "hyperedge_mimir_distributed_storage", "label": "Mimir Distributed with Minio Storage", "nodes": ["mimir_app_helmrelease", "mimir_chart_mimir_distributed", "mimir_namespace"], "relation": "forms_mimir_storage_stack", "confidence": "EXTRACTED", "confidence_score": 0.95, "source_file": "kubernetes/infra/monitoring/mimir/app.yaml"}, {"id": "cilium_lb_stack", "label": "Cilium L2 LoadBalancer IP advertisement stack", "nodes": ["cilium_l2_announcement_feature", "cilium_announcement", "cilium_ip_pool"], "relation": "implements_lb_ip_advertisement", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "kubernetes/infra/network/cilium/announcement.yaml"}, {"id": "gateway_tls_termination_stack", "label": "Gateway API TLS termination: internal gateway + wildcard cert + cloudflare issuer", "nodes": ["gateway_internal", "gateway_certificate", "cloudflare_clusterissuer"], "relation": "implements_tls_termination", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "kubernetes/infra/network/gateway/gateway-internal.yaml"}, {"id": "vpn_deployment_stack", "label": "WireGuard VPN deployment: wg-easy pod + NFS PVC + LB service", "nodes": ["vpn_deployment", "vpn_pvc", "vpn_service_lb"], "relation": "forms_vpn_workload", "confidence": "EXTRACTED", "confidence_score": 0.95, "source_file": "kubernetes/infra/network/vpn/deployment.yaml"}];
// afterDrawing passes ctx already transformed to network coordinate space.
// Draw node positions raw — no manual pan/zoom/DPR math needed.
network.on('afterDrawing', function(ctx) {
    hyperedges.forEach(h => {
        const positions = h.nodes
            .map(nid => network.getPositions([nid])[nid])
            .filter(p => p !== undefined);
        if (positions.length < 2) return;
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#6366f1';
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        // Centroid and expanded hull in network coordinates
        const cx = positions.reduce((s, p) => s + p.x, 0) / positions.length;
        const cy = positions.reduce((s, p) => s + p.y, 0) / positions.length;
        const expanded = positions.map(p => ({
            x: cx + (p.x - cx) * 1.15,
            y: cy + (p.y - cy) * 1.15
        }));
        ctx.moveTo(expanded[0].x, expanded[0].y);
        expanded.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.stroke();
        // Label
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#4f46e5';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(h.label, cx, cy - 5);
        ctx.restore();
    });
});
