---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: tools/.python-version

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Install terraform-docs
        env:
          TERRAFORM_DOCS_VERSION: "0.23.0"
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 --retry-delay 5 --retry-all-errors -sSLo terraform-docs.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/v${TERRAFORM_DOCS_VERSION}/terraform-docs-v${TERRAFORM_DOCS_VERSION}-linux-amd64.tar.gz"
          tar -xzf terraform-docs.tar.gz terraform-docs
          sudo install -m 0755 terraform-docs /usr/local/bin/terraform-docs

      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: tools/.python-version

      - name: Run Codex harness tests
        run: python3 -m unittest discover -s tools/codex-harness/tests

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Run tests
        run: >-
          uv run --project tools/agent-memory --with pytest pytest
          tools/agent-memory/tests

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform

      - name: Validate Terraform root modules
        run: |
          set -euo pipefail

          terraform_init_with_retry() {
            local dir="$1"
            local attempt

            for attempt in 1 2 3; do
              if terraform -chdir="${dir}" init -backend=false -input=false -no-color; then
                return 0
              fi

              if [ "${attempt}" -eq 3 ]; then
                echo "::error::terraform init failed for ${dir} after ${attempt} attempts"
                return 1
              fi

              echo "terraform init failed for ${dir}; retrying in 10 seconds (attempt $((attempt + 1))/3)"
              sleep 10
            done
          }

          for dir in \
            terraform/production \
            terraform/development \
            terraform/external/grafana \
            terraform/external/nexus \
            terraform/external/synology
          do
            echo "::group::${dir}"
            terraform_init_with_retry "${dir}"
            terraform -chdir="${dir}" validate -no-color
            echo "::endgroup::"
          done

  kubernetes:
    name: Kubernetes
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: "0.7.0"
        run: |
          set -euo pipefail
          archive="kubeconform-linux-amd64.tar.gz"
          url="https://github.com/yannh/kubeconform/releases/download"
          curl -sSLo kubeconform.tar.gz \
            "${url}/v${KUBECONFORM_VERSION}/${archive}"
          tar -xzf kubeconform.tar.gz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: Render production manifests
        run: >-
          kubectl kustomize kubernetes/clusters/production >
          /tmp/homelab-production.yaml

      - name: Render development manifests
        run: >-
          kubectl kustomize kubernetes/clusters/development >
          /tmp/homelab-development.yaml

      - name: Validate rendered manifests
        run: >-
          kubeconform -summary -ignore-missing-schemas
          /tmp/homelab-production.yaml
          /tmp/homelab-development.yaml

  secrets:
    name: Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check encrypted secret manifests
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find kubernetes \
              \( -path '*/secret.yaml' -o -name 'grafana-env.yaml' \) \
              -type f |
              sort
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No secret manifests found."
            exit 0
          fi

          failed=0
          for file in "${files[@]}"; do
            if ! grep -Eq '^sops:' "${file}"; then
              echo "::error file=${file}::Missing top-level sops block"
              failed=1
            fi
            if ! grep -q 'ENC\[' "${file}"; then
              echo "::error file=${file}::Missing encrypted ENC[...] values"
              failed=1
            fi
          done
          exit "${failed}"

  agnix:
    name: Agnix
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.16.0"

      - name: Install Agnix
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm install --global agnix@0.25.0; then
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep 10
          done

      - name: Validate agent instructions
        run: agnix .
