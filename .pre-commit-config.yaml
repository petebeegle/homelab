---
repos:
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: end-of-file-fixer
  - repo: https://github.com/Agilicus/pre-commit-hook-k8svalidate.git
    rev: v0.2.0
    hooks:
      - id: k8svalidate
        files: .yaml$
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_docs
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - build
          - chore
          - ci
          - docs
          - feat
          - fix
          - perf
          - refactor
          - revert
          - style
          - test
  - repo: local
    hooks:
      - id: spec-kit-push-guard
        name: Require Spec Kit evidence before origin push
        entry: .codex/hooks/verifier_push_guard.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
      - id: architecture-doc
        name: Check generated architecture document
        entry: python3 tools/architecture/render.py --check
        language: system
        stages: [pre-commit]
        pass_filenames: false
        always_run: true
      - id: synology-oauth-redirect
        name: Check Synology OAuth redirect path
        entry: python3 tools/policy/check_synology_oauth_redirect.py
        language: system
        files: ^(kubernetes/infra/authentik/blueprints/synology-oauth\.yaml|tools/policy/check_synology_oauth_redirect\.py|\.pre-commit-config\.yaml)$
        pass_filenames: false
      - id: retrieval-manifest
        name: Check Codex retrieval manifest
        entry: python3 tools/policy/check_retrieval_manifest.py
        language: system
        files: ^(\.codex/retrieval\.yaml|tools/policy/check_retrieval_manifest\.py|\.pre-commit-config\.yaml)$
        pass_filenames: false
      - id: decision-metadata
        name: Check decision record metadata
        entry: python3 tools/policy/check_decision_metadata.py
        language: system
        files: ^(docs/decisions/.*\.md|tools/policy/check_decision_metadata\.py|\.pre-commit-config\.yaml)$
        pass_filenames: false
      - id: mcp-config-consistency
        name: Check MCP config consistency
        entry: python3 tools/policy/check_mcp_config_consistency.py
        language: system
        files: ^(\.mcp\.json|\.codex/config\.toml|tools/policy/check_mcp_config_consistency\.py|\.pre-commit-config\.yaml)$
        pass_filenames: false
      - id: synthetic-smoke-mirroring
        name: Check synthetic smoke mirrored files
        entry: python3 tools/policy/check_synthetic_smoke_mirroring.py
        language: system
        files: ^(tests/smoke/(routes\.spec\.js|package-lock\.json)|kubernetes/apps/synthetics/smoke/(routes\.spec\.js|package-lock\.json)|tools/policy/check_synthetic_smoke_mirroring\.py|\.pre-commit-config\.yaml)$
        pass_filenames: false
