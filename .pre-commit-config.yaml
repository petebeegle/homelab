---
repos:
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: end-of-file-fixer
  - repo: https://github.com/Agilicus/pre-commit-hook-k8svalidate.git
    rev: v0.2.0
    hooks:
      - id: k8svalidate
        files: .yaml$
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_docs
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - build
          - chore
          - ci
          - docs
          - feat
          - fix
          - perf
          - refactor
          - revert
          - style
          - test
  - repo: local
    hooks:
      - id: verifier-push-guard
        name: Require verifier approval before origin push
        entry: .codex/hooks/verifier_push_guard.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
      - id: architecture-doc
        name: Check generated architecture document
        entry: python3 tools/architecture/render.py --check
        language: system
        stages: [pre-commit]
        pass_filenames: false
        always_run: true
      - id: agent-memory-lint
        name: Lint Codex memory docs
        entry: bash -c 'PYTHONPATH=tools/agent-memory/src python3 -m agent_memory.cli lint'
        language: system
        files: ^(\.codex/memory/|tools/agent-memory/|\.pre-commit-config\.yaml$)
        pass_filenames: false
