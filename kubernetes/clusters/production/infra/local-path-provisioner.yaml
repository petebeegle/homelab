---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: local-path-provisioner
  namespace: flux-system
spec:
  interval: 2m
  retryInterval: 2m
  path: ./kubernetes/infra/controllers/local-path-provisioner
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
