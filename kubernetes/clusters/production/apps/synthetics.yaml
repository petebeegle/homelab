---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-synthetics
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 2m
  path: ./kubernetes/apps/synthetics
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: gateway
    - name: grafana
    - name: authentik
    - name: app-whoami
    - name: app-jellyfin
    - name: app-pihole
    - name: app-foundryvtt
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
