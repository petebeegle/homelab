---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-immich
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 2m
  path: ./kubernetes/apps/immich
  prune: true
  wait: true
  timeout: 20m
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: gateway
    - name: nfs-csi
    - name: local-path-provisioner
    - name: cloudnative-pg
    - name: authentik
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
