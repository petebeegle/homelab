---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-transfer
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 2m
  path: ./kubernetes/apps/transfer
  prune: true
  deletionPolicy: Orphan
  wait: true
  sourceRef:
    kind: GitRepository
    name: homelab-private
  dependsOn:
    - name: private-source
    - name: gateway
    - name: nfs-csi
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
