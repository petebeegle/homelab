---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
spec:
  url: https://grafana.github.io/helm-charts
  interval: 12h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: grafana-operator
spec:
  interval: 5m0s
  install:
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: grafana-operator
      version: 5.23.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: grafana-operator
  values:
    # Watch all namespaces
    watchNamespaces: ""
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
