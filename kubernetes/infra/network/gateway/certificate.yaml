---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ${wildcard_cert_name}
  namespace: gateway
spec:
  secretName: ${wildcard_cert_name}
  dnsNames:
    - "*.${cluster_domain}"
  issuerRef:
    name: cloudflare
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: synology-petebeegle-com
  namespace: gateway
spec:
  secretName: synology-petebeegle-com
  dnsNames:
    - synology.petebeegle.com
  issuerRef:
    name: cloudflare
    kind: ClusterIssuer
