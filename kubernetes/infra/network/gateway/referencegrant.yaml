---
# Allow HTTPRoutes from application namespaces to reference shared Gateways.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: apps-to-internal-gateway
  namespace: gateway
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: foundryvtt
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: pihole
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: jellyfin
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: whoami
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: external
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: wireguard
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: grafana
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: authentik
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
---
# Allow TLSRoutes from external namespace to reference shared passthrough Gateways.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: external-to-passthrough-gateway
  namespace: gateway
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: TLSRoute
      namespace: external
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
