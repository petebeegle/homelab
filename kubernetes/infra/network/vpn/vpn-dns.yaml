---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vpn-dns-config
  namespace: wireguard
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        template IN A lab.petebeegle.com {
            match ^(.+\.)lab\.petebeegle\.com\.$
            answer "{{ .Name }} 60 IN A 192.168.40.241"
            fallthrough
        }
        forward . 192.168.1.1
        cache 300
        reload
        loadbalance
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-dns
  namespace: wireguard
spec:
  replicas: 2
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vpn-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vpn-dns
    spec:
      containers:
        - name: coredns
          image: registry.k8s.io/coredns/coredns:v1.12.4
          imagePullPolicy: IfNotPresent
          args:
            - -conf
            - /etc/coredns/Corefile
          ports:
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 8080
              name: health
              protocol: TCP
            - containerPort: 8181
              name: ready
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: health
            periodSeconds: 10
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ready
              port: ready
            periodSeconds: 10
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - mountPath: /etc/coredns
              name: config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: vpn-dns-config
---
apiVersion: v1
kind: Service
metadata:
  name: vpn-dns
  namespace: wireguard
  labels:
    homelab.petebeegle.com/exposure: external
  annotations:
    io.cilium/lb-ipam-ips: 192.168.40.250
spec:
  type: LoadBalancer
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: dns-udp
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: dns-tcp
  selector:
    app.kubernetes.io/name: vpn-dns
