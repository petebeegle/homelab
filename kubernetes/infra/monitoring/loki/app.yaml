---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: loki
spec:
  interval: 5m0s
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: loki
      version: 6.37.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      ingester:
        chunk_encoding: snappy
      tracing:
        enabled: true
      querier:
        max_concurrent: 4
      schemaConfig:
        configs:
          - from: "2025-05-26"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
    lokiCanary:
      enabled: false
    test:
      enabled: false

    limits_config:
      allow_structured_metadata: true
      retention_period: 336h  # 14 days

    deploymentMode: SimpleScalable

    backend:
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "3100"
    read:
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "3100"
    write:
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 768Mi
        limits:
          cpu: 1000m
          memory: 1536Mi
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "3100"

    gateway:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi

    # Enable minio for storage
    minio:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    chunksCache:
      allocatedMemory: 512
      resources:
        requests:
          cpu: 50m
          memory: 640Mi
        limits:
          cpu: 500m
          memory: 768Mi

    resultsCache:
      allocatedMemory: 256
      resources:
        requests:
          cpu: 25m
          memory: 320Mi
        limits:
          cpu: 250m
          memory: 384Mi

    # Zero out replica counts of other deployment modes
    singleBinary:
      replicas: 0

    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      retention_enabled: true
      delete_request_store: s3
    indexGateway:
      replicas: 0
    bloomCompactor:
      replicas: 0
    bloomGateway:
      replicas: 0
