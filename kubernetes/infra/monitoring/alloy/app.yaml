---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 5m0s
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: alloy
      version: 1.2.1
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    rbac:
      create: true
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "12345"
    serviceAccount:
      automountServiceAccountToken: true
    controller:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    alloy:
      clustering:
        enabled: true
      mounts:
        varlog: true
      configMap:
        create: false
        name: alloy-config
        key: config.alloy
    configReloader:
      enabled: true
