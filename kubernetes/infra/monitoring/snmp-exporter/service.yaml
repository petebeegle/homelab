apiVersion: v1
kind: Service
metadata:
  name: snmp-exporter
  namespace: monitoring
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9116"
  labels:
    app: snmp-exporter
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9116
      targetPort: http
      protocol: TCP
  selector:
    app: snmp-exporter
