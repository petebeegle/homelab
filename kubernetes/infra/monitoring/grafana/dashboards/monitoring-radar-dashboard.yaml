---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: monitoring-radar
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folderRef: "monitoring"
  configMapRef:
    name: monitoring-radar-dashboard
    key: dashboard.json
