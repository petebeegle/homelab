---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: immich-overview
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folderRef: "immich"
  json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": true,
          "targetBlank": false,
          "title": "Kubernetes",
          "type": "link",
          "url": "/d/k8s-general-overview"
        }
      ],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "title": "Immich Scrapes Up",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "12.0.0",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "min(up{namespace=\"immich\",service=~\"immich-server|immich-server-metrics-ms\"}) OR vector(0)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
