---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grafana
configMapGenerator:
  - name: flux-dashboard
    namespace: grafana
    files:
      - dashboard.json=flux-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: kubernetes-dashboard
    namespace: grafana
    files:
      - dashboard.json=kubernetes-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: proxmox-dashboard
    namespace: grafana
    files:
      - dashboard.json=proxmox-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: authentik-dashboard
    namespace: grafana
    files:
      - dashboard.json=authentik-dashboard.json
    options:
      disableNameSuffixHash: true
resources:
  - proxmox-dashboard.yaml
  - flux-dashboard.yaml
  - kubernetes-dashboard.yaml
  - authentik-dashboard.yaml
