---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grafana
configMapGenerator:
  - name: flux-dashboard
    namespace: grafana
    files:
      - dashboard.json=flux-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: kubernetes-dashboard
    namespace: grafana
    files:
      - dashboard.json=kubernetes-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: proxmox-dashboard
    namespace: grafana
    files:
      - dashboard.json=proxmox-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: authentik-dashboard
    namespace: grafana
    files:
      - dashboard.json=authentik-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: jellyfin-dashboard
    namespace: grafana
    files:
      - dashboard.json=jellyfin-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: arr-stack-dashboard
    namespace: grafana
    files:
      - dashboard.json=arr-stack-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: observability-health-dashboard
    namespace: grafana
    files:
      - dashboard.json=observability-health-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: codex-operations-dashboard
    namespace: grafana
    files:
      - dashboard.json=codex-operations-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: synthetic-smoke-dashboard
    namespace: grafana
    files:
      - dashboard.json=synthetic-smoke-dashboard.json
    options:
      disableNameSuffixHash: true
  - name: monitoring-radar-dashboard
    namespace: grafana
    files:
      - dashboard.json=monitoring-radar-dashboard.json
    options:
      disableNameSuffixHash: true
resources:
  - proxmox-dashboard.yaml
  - flux-dashboard.yaml
  - kubernetes-dashboard.yaml
  - authentik-dashboard.yaml
  - jellyfin-dashboard.yaml
  - arr-stack-dashboard.yaml
  - observability-health-dashboard.yaml
  - codex-operations-dashboard.yaml
  - synthetic-smoke-dashboard.yaml
  - monitoring-radar-dashboard.yaml
