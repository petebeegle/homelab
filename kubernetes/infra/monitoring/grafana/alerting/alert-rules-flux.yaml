---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaAlertRuleGroup
metadata:
  name: flux
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folderRef: "flux"
  interval: 1m
  rules:
    - uid: flux-resources-suspended
      title: Flux Resources Suspended
      condition: C
      for: 10m
      noDataState: NoData
      execErrState: Error
      annotations:
        description: "{{ $value }} Flux resource(s) are currently suspended and will not reconcile"
        summary: Flux resources are suspended
        runbook: "Start with: flux get all -A --status-selector suspended=true; kubectl get kustomizations,helmreleases -A"
      labels:
        severity: warning
        component: flux
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: count(gotk_resource_info{suspended="true",job="prometheus.scrape.service"}) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 0
                  type: gt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: flux-resources-failing
      title: Flux Resources Failing
      condition: C
      for: 10m
      noDataState: NoData
      execErrState: Error
      annotations:
        description: "{{ $value }} Flux resource(s) are failing reconciliation"
        summary: Flux resources in failed state
        runbook: "Start with: flux get all -A; flux logs --level=error --since=30m; flux debug kustomization <name> -n <namespace> --show-vars"
      labels:
        severity: critical
        component: flux
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: count(gotk_resource_info{ready="False",job="prometheus.scrape.service"}) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 0
                  type: gt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: flux-resources-stale
      title: Flux Resources Readiness Unknown
      condition: C
      for: 5m
      noDataState: NoData
      execErrState: Error
      annotations:
        description: "{{ $value }} Flux resource(s) report unknown readiness and may not be reconciling cleanly"
        summary: Flux resource readiness is unknown
        runbook: "Start with: flux get all -A; kubectl describe kustomization -n <namespace> <name>; kubectl describe helmrelease -n <namespace> <name>"
      labels:
        severity: warning
        component: flux
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: count(gotk_resource_info{ready="Unknown",job="prometheus.scrape.service"}) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 0
                  type: gt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: flux-reconciliation-rate-low
      title: Flux Reconciliation Rate Low
      condition: C
      for: 15m
      noDataState: Alerting
      execErrState: Error
      annotations:
        description: "Flux reconciliation rate is {{ $values.B.Value | humanize }}ops/s (expected > 0.01 ops/s)"
        summary: Flux controllers may not be reconciling
        runbook: "Start with: kubectl -n flux-system get pods -o wide; flux logs --since=30m; kubectl -n flux-system describe deploy kustomize-controller helm-controller source-controller"
      labels:
        severity: warning
        component: flux
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: sum(rate(gotk_reconcile_duration_seconds_count[5m])) OR on() vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 0.01
                  type: lt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C
