---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaAlertRuleGroup
metadata:
  name: apps
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folderRef: "monitoring"
  interval: 1m
  rules:
    - uid: authentik-server-not-ready
      title: Authentik Server Not Ready
      condition: C
      for: 10m
      noDataState: Alerting
      execErrState: Error
      annotations:
        description: "Authentik server is missing {{ $values.B.Value }} desired available replica(s)."
        summary: Authentik server availability is degraded
        runbook: "Start with: kubectl -n authentik get deploy,pods -o wide; kubectl -n authentik describe deploy authentik-server; kubectl -n authentik logs deploy/authentik-server --tail=100"
      labels:
        severity: critical
        component: apps
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: sum(kube_deployment_spec_replicas{namespace="authentik",deployment="authentik-server"} - kube_deployment_status_replicas_available{namespace="authentik",deployment="authentik-server"}) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 0
                  type: gt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: authentik-worker-not-ready
      title: Authentik Worker Not Ready
      condition: C
      for: 10m
      noDataState: Alerting
      execErrState: Error
      annotations:
        description: "Authentik worker is missing {{ $values.B.Value }} desired available replica(s)."
        summary: Authentik background worker availability is degraded
        runbook: "Start with: kubectl -n authentik get deploy,pods -o wide; kubectl -n authentik describe deploy authentik-worker; kubectl -n authentik logs deploy/authentik-worker --tail=100"
      labels:
        severity: critical
        component: apps
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: sum(kube_deployment_spec_replicas{namespace="authentik",deployment="authentik-worker"} - kube_deployment_status_replicas_available{namespace="authentik",deployment="authentik-worker"}) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 0
                  type: gt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: pihole-availability-low
      title: Pi-hole Availability Low
      condition: C
      for: 10m
      noDataState: Alerting
      execErrState: Error
      annotations:
        description: "Pi-hole has {{ $values.B.Value }} running pod(s)."
        summary: Pi-hole DNS availability is degraded
        runbook: "Start with: kubectl -n pihole get pods,svc -o wide; kubectl -n pihole describe pod <pod>; flux debug helmrelease pihole -n pihole --show-values"
      labels:
        severity: critical
        component: apps
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: sum(kube_pod_status_phase{exported_namespace="pihole",phase="Running"} > bool 0) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 1
                  type: lt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: jellyfin-availability-low
      title: Jellyfin Availability Low
      condition: C
      for: 10m
      noDataState: Alerting
      execErrState: Error
      annotations:
        description: "Jellyfin has {{ $values.B.Value }} running pod(s)."
        summary: Jellyfin availability is degraded
        runbook: "Start with: kubectl -n jellyfin get pods,pvc -o wide; kubectl -n jellyfin describe pod <pod>; flux debug helmrelease jellyfin -n jellyfin --show-values"
      labels:
        severity: warning
        component: apps
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: sum(kube_pod_status_phase{exported_namespace="jellyfin",phase="Running"} > bool 0) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 1
                  type: lt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: valheim-availability-low
      title: Valheim Availability Low
      condition: C
      for: 10m
      noDataState: Alerting
      execErrState: Error
      annotations:
        description: "Valheim has {{ $values.B.Value }} running pod(s)."
        summary: Valheim server availability is degraded
        runbook: "Start with: kubectl -n valheim get pods,pvc,svc -o wide; kubectl -n valheim describe pod <pod>; flux debug helmrelease valheim-server -n valheim --show-values"
      labels:
        severity: warning
        component: apps
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: sum(kube_pod_status_phase{exported_namespace="valheim",phase="Running"} > bool 0) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 1
                  type: lt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C
