---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaAlertRuleGroup
metadata:
  name: proxmox
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folderRef: "proxmox"
  interval: 1m
  rules:
    - uid: proxmox-node-down
      title: Proxmox Node Count Low
      condition: C
      for: 5m
      noDataState: Alerting
      execErrState: Error
      annotations:
        description: "Expected 3 Proxmox nodes, currently detecting {{ $values.B.Value }} node(s)"
        summary: One or more Proxmox nodes are unreachable
        runbook: "Start with: kubectl -n otel-collector get pods,svc -o wide; check Proxmox UI for pve01/pve02/pve03; verify OTLP metrics source before changing hosts"
      labels:
        severity: critical
        component: proxmox
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: count(count by (proxmox_node) (proxmox_proxmox_node_uptime_seconds)) OR on() vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 3
                  type: lt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: proxmox-kubernetes-vm-count-low
      title: Proxmox Kubernetes VM Count Low
      condition: C
      for: 10m
      noDataState: Alerting
      execErrState: Error
      annotations:
        description: "Expected 5 Kubernetes/Talos VMs in Proxmox metrics, currently detecting {{ $values.B.Value }}."
        summary: A Kubernetes VM may be missing or down in Proxmox
        runbook: "Start with: kubectl get nodes -o wide; check Proxmox UI for Talos/Kubernetes VM state; talosctl health --nodes <node-ip>"
      labels:
        severity: critical
        component: proxmox
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: count(proxmox_proxmox_vm_uptime_seconds{name=~"k8s-.+"}) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 5
                  type: lt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: proxmox-host-storage-high
      title: Proxmox Host Storage High
      condition: C
      for: 30m
      noDataState: NoData
      execErrState: Error
      annotations:
        description: "The fullest Proxmox host storage target is {{ $values.B.Value | humanize }}% used."
        summary: Proxmox host storage usage is high
        runbook: "Start with: check the Proxmox UI storage view; review proxmox_proxmox_storage_used_bytes by proxmox_node/proxmox_storage; confirm backups or ISO growth before removing data"
      labels:
        severity: warning
        component: proxmox
      data:
        - refId: A
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: prometheus
          model:
            expr: max(100 * (proxmox_proxmox_storage_used_bytes / proxmox_proxmox_storage_total_bytes)) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 85
                  type: gt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: proxmox-host-cpu-high
      title: Proxmox Host CPU High
      condition: C
      for: 30m
      noDataState: NoData
      execErrState: Error
      annotations:
        description: "The busiest Proxmox host is at {{ $values.B.Value | humanize }}% CPU over the last 5 minutes."
        summary: Proxmox host CPU usage is high
        runbook: "Start with: check the Proxmox UI node summary; review top VM CPU in Grafana; kubectl top nodes can show whether Kubernetes workloads correlate"
      labels:
        severity: warning
        component: proxmox
      data:
        - refId: A
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: prometheus
          model:
            expr: max(100 * proxmox_proxmox_node_cpustat_cpu_percent) OR vector(0)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 90
                  type: gt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C

    - uid: proxmox-host-memory-high
      title: Proxmox Host Memory Headroom Low
      condition: C
      for: 30m
      noDataState: NoData
      execErrState: Error
      annotations:
        description: "The lowest Proxmox host memory headroom is {{ $values.B.Value | humanize }} GiB free. Fixed VM allocation can hold raw host memory usage around 90-94%; that is not actionable unless free host memory falls below 3 GiB."
        summary: Proxmox host memory headroom is below 3 GiB
        runbook: "Start with: check the Proxmox UI node memory view for free host memory; compare VM allocation and ballooning in Grafana. Raw usage around 90-94% from fixed VM allocation is expected unless free host memory is below 3 GiB."
      labels:
        severity: warning
        component: proxmox
      data:
        - refId: A
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: prometheus
          model:
            expr: min((proxmox_proxmox_node_memory_memtotal_bytes - proxmox_proxmox_node_memory_memused_bytes) / 1024 / 1024 / 1024)
            refId: A
        - refId: B
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: __expr__
          model:
            expression: A
            reducer: last
            type: reduce
            refId: B
        - refId: C
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: __expr__
          model:
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 3
                  type: lt
                operator:
                  type: and
                query:
                  params:
                    - C
                type: query
            type: threshold
            refId: C
