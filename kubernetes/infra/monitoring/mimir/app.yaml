---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: monitoring
spec:
  interval: 5m0s
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: mimir-distributed
      version: 5.8.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    mimir:
      structuredConfig:
        limits:
          max_global_series_per_user: 2000000
          out_of_order_time_window: 5m
          ingestion_rate: 50000 # samples/sec (increased from default 10000)
          ingestion_burst_size: 500000 # increased from default 200000
        ingester:
          ring:
            replication_factor: 1
        store_gateway:
          sharding_ring:
            replication_factor: 1
        alertmanager:
          enable_api: true
          external_url: http://mimir-alertmanager/alertmanager
          fallback_config_file: /configs/alertmanager.yaml
        alertmanager_storage:
          backend: filesystem
          filesystem:
            dir: /data/alertmanager
    distributor:
      replicas: 1
    alertmanager:
      replicas: 1
      extraEnvFrom:
        - secretRef:
            name: alertmanager-discord
      statefulSet:
        enabled: true
    ingester:
      replicas: 1
      zoneAwareReplication:
        enabled: false
      persistentVolume:
        size: 50Gi
    store_gateway:
      replicas: 1
      zoneAwareReplication:
        enabled: false
    minio:
      persistence:
        size: 50Gi
      serviceAccount:
        name: "mimir-minio-sa"
    alertmanagerConfig: |
      global:
        resolve_timeout: 5m

      route:
        receiver: 'discord'
        group_by: ['alertname', 'proxmox_node']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

      receivers:
        - name: 'discord'
          discord_configs:
            - webhook_url: ${webhook_url}
              send_resolved: true
              title: '{{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
              message: |
                **Alert:** {{ .CommonLabels.alertname }}
                **Node:** {{ .CommonLabels.proxmox_node }}
                **Status:** {{ .Status }}
                **Severity:** {{ .CommonLabels.severity }}

                {{ range .Alerts }}
                **Summary:** {{ .Annotations.summary }}
                **Description:** {{ .Annotations.description }}
                **Started:** {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}
                {{ if .EndsAt }}**Ended:** {{ .EndsAt.Format "2006-01-02 15:04:05 MST" }}{{ end }}

                **Links:**
                {{ if .Annotations.dashboard }}📊 [Dashboard]({{ .Annotations.dashboard }}){{ end }}
                {{ if .Annotations.runbook }}📖 [Runbook]({{ .Annotations.runbook }}){{ end }}
                {{ if .Annotations.grafana_query }}🔍 [Query in Grafana]({{ .Annotations.grafana_query }}){{ end }}
                {{ end }}
