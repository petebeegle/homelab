---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: mimir
spec:
  interval: 5m0s
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: mimir-distributed
      version: 5.8.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    mimir:
      structuredConfig:
        limits:
          max_global_series_per_user: 2000000
          out_of_order_time_window: 5m
          ingestion_rate: 50000  # samples/sec (increased from default 10000)
          ingestion_burst_size: 500000  # increased from default 200000
        ingester:
          ring:
            replication_factor: 1
        store_gateway:
          sharding_ring:
            replication_factor: 1
    distributor:
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
    alertmanager:
      enabled: false
    ingester:
      replicas: 1
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 1500m
          memory: 2Gi
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
      zoneAwareReplication:
        enabled: false
      persistentVolume:
        size: 50Gi
    querier:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      topologySpreadConstraints:
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
    query_frontend:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
    query_scheduler:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      topologySpreadConstraints:
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
    store_gateway:
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
      zoneAwareReplication:
        enabled: false
    compactor:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
    minio:
      persistence:
        size: 50Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      serviceAccount:
        name: "mimir-minio-sa"
    nginx:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    ruler:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
