# Authentik server configuration
authentik:
  secret_key: ""  # Set via envFrom
  error_reporting:
    enabled: false  # Disable telemetry
  postgresql:
    password: ""  # Set via envFrom

# Embedded PostgreSQL
postgresql:
  enabled: true
  auth:
    existingSecret: authentik-secrets
    secretKeys:
      adminPasswordKey: password
  primary:
    extendedConfiguration: |
      max_connections = 500
      checkpoint_completion_target = 0.9
      checkpoint_timeout = 15min
      max_wal_size = 2GB
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      enabled: true
      storageClass: nfs-csi-storage
      size: 10Gi

# Server configuration
server:
  replicas: 1
  envFrom:
    - secretRef:
        name: authentik-secrets
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  livenessProbe:
    failureThreshold: 6
    timeoutSeconds: 10
  readinessProbe:
    failureThreshold: 6
    timeoutSeconds: 10
  startupProbe:
    failureThreshold: 60
    timeoutSeconds: 10
  ingress:
    enabled: false  # Using Gateway API
  metrics:
    enabled: true
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9300"
    serviceMonitor:
      enabled: true
      interval: 30s

# Worker configuration
worker:
  replicas: 1
  envFrom:
    - secretRef:
        name: authentik-secrets
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  livenessProbe:
    failureThreshold: 6
    timeoutSeconds: 10
  readinessProbe:
    failureThreshold: 6
    timeoutSeconds: 10
  startupProbe:
    failureThreshold: 60
    timeoutSeconds: 10
  metrics:
    enabled: true
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9300"
    serviceMonitor:
      enabled: true
      interval: 30s

# Disable GeoIP (not needed for homelab)
geoip:
  enabled: false
