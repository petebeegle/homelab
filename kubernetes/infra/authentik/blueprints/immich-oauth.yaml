# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
---
version: 1
metadata:
  name: immich-oauth2-setup
  labels:
    blueprints.goauthentik.io/instantiate: "true"
context:
  immich_client_id: immich
  immich_client_secret: !Env IMMICH_OAUTH_CLIENT_SECRET

entries:
  - identifiers:
      name: Immich Users
    model: authentik_core.group
    attrs:
      name: Immich Users

  - identifiers:
      name: Immich Admins
    model: authentik_core.group
    attrs:
      name: Immich Admins

  - identifiers:
      managed: goauthentik.io/providers/oauth2/immich-role
    model: authentik_providers_oauth2.scopemapping
    attrs:
      name: Immich Role Mapping
      scope_name: immich
      expression: |
        groups = [group.name for group in request.user.ak_groups.all()]
        return {
          "immich_role": "admin" if "Immich Admins" in groups else "user",
        }

  - identifiers:
      name: immich
    model: authentik_providers_oauth2.oauth2provider
    attrs:
      name: immich
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
      client_type: confidential
      grant_types:
        - authorization_code
        - refresh_token
      client_id: !Context immich_client_id
      client_secret: !Context immich_client_secret
      redirect_uris:
        - matching_mode: strict
          url: app.immich:///oauth-callback
        - matching_mode: strict
          url: https://immich.${cluster_domain}/auth/login
        - matching_mode: strict
          url: https://immich.${cluster_domain}/user-settings
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/immich-role]]
      sub_mode: hashed_user_id
      issuer_mode: per_provider
      access_code_validity: minutes=1
      access_token_validity: minutes=5
      refresh_token_validity: days=30

  - identifiers:
      slug: immich
    model: authentik_core.application
    attrs:
      name: Immich
      slug: immich
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, immich]]
      policy_engine_mode: any
      meta_launch_url: https://immich.${cluster_domain}/auth/login?autoLaunch=1
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/immich.png
      meta_description: Photo and video backup
      open_in_new_tab: true
