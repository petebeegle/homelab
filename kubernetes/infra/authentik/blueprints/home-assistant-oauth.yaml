# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
---
version: 1
metadata:
  name: home-assistant-oauth2-setup
  labels:
    blueprints.goauthentik.io/instantiate: "true"
context:
  home_assistant_client_id: home-assistant

entries:
  - identifiers:
      name: Home Assistant Users
    model: authentik_core.group
    attrs:
      name: Home Assistant Users

  - identifiers:
      name: Home Assistant Admins
    model: authentik_core.group
    attrs:
      name: Home Assistant Admins

  - identifiers:
      managed: goauthentik.io/providers/oauth2/home-assistant-groups
    model: authentik_providers_oauth2.scopemapping
    attrs:
      name: Home Assistant Groups Mapping
      scope_name: groups
      expression: |
        return {
          "groups": [group.name for group in request.user.ak_groups.all()],
        }

  - identifiers:
      name: home-assistant
    model: authentik_providers_oauth2.oauth2provider
    attrs:
      name: home-assistant
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
      client_type: public
      grant_types:
        - authorization_code
        - refresh_token
      client_id: !Context home_assistant_client_id
      redirect_uris:
        - matching_mode: strict
          url: https://homeassistant.${cluster_domain}/auth/oidc/callback
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/home-assistant-groups]]
      sub_mode: hashed_user_id
      issuer_mode: per_provider
      access_code_validity: minutes=1
      access_token_validity: minutes=5
      refresh_token_validity: days=30

  - identifiers:
      slug: home-assistant
    model: authentik_core.application
    attrs:
      name: Home Assistant
      slug: home-assistant
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, home-assistant]]
      policy_engine_mode: any
      meta_launch_url: https://homeassistant.${cluster_domain}
      meta_icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/home-assistant.png
      meta_description: Home automation
      open_in_new_tab: true
