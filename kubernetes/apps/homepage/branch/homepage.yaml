---
apiVersion: v1
kind: Namespace
metadata:
  name: homepage-${branch_slug}
  labels:
    name: homepage-${branch_slug}
    app.kubernetes.io/name: homepage
    app.kubernetes.io/part-of: branch-environment
    homelab.petebeegle.com/branch-slug: ${branch_slug}
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage-${branch_slug}
  namespace: homepage-${branch_slug}
  labels:
    app.kubernetes.io/name: homepage
    homelab.petebeegle.com/branch-slug: ${branch_slug}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage-${branch_slug}
  labels:
    app.kubernetes.io/name: homepage
    homelab.petebeegle.com/branch-slug: ${branch_slug}
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - nodes
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
      - httproutes
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-${branch_slug}
  labels:
    app.kubernetes.io/name: homepage
    homelab.petebeegle.com/branch-slug: ${branch_slug}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage-${branch_slug}
subjects:
  - kind: ServiceAccount
    name: homepage-${branch_slug}
    namespace: homepage-${branch_slug}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-public-config
  namespace: homepage-${branch_slug}
  labels:
    app.kubernetes.io/name: homepage
    homelab.petebeegle.com/branch-slug: ${branch_slug}
data:
  settings.yaml: |
    title: Home Lab
    description: Branch Homepage dashboard
    target: _self
    statusStyle: dot
    hideVersion: true
    showStats: true
    layout:
      Branch:
        style: row
        columns: 3
  services.yaml: |
    - Branch:
        - Homepage:
            icon: homepage.png
            href: https://homepage-${branch_slug}.${cluster_domain}
            description: Branch dashboard
            namespace: homepage-${branch_slug}
            app: homepage
        - Whoami:
            icon: mdi-test-tube
            href: https://whoami.${cluster_domain}
            description: Gateway routing canary
            namespace: whoami
            app: whoami
  bookmarks.yaml: |
    - Repositories:
        - Homelab:
            - abbr: Git
              href: https://github.com/petebeegle/homelab/tree/${branch_name}
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
  kubernetes.yaml: |
    mode: cluster
    ingress: false
    traefik: false
    gateway: true
  docker.yaml: |
    {}
  custom.css: |
    :root {
      --homepage-dashboard-note: "homelab-branch-config";
    }
  custom.js: |
    // Branch Homepage custom JavaScript intentionally left minimal.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-${branch_slug}
  namespace: homepage-${branch_slug}
  labels:
    app.kubernetes.io/name: homepage
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
      homelab.petebeegle.com/branch-slug: ${branch_slug}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
        homelab.petebeegle.com/branch-slug: ${branch_slug}
    spec:
      serviceAccountName: homepage-${branch_slug}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: merge-config
          image: mikefarah/yq:4.45.4
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              merge_homepage_config() {
                mkdir -p /app/config /tmp/homepage-merge
                for file in services.yaml bookmarks.yaml widgets.yaml; do
                  public="/config/public/$file"
                  private="/config/private/$file"
                  public_default="/tmp/homepage-merge/public-$file"
                  private_default="/tmp/homepage-merge/private-$file"
                  if [ -f "$public" ]; then cp "$public" "$public_default"; else printf '[]\n' > "$public_default"; fi
                  if [ -f "$private" ]; then cp "$private" "$private_default"; else printf '[]\n' > "$private_default"; fi
                  yq ea '. as $item ireduce ([]; . + ($item // []))' "$public_default" "$private_default" > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
                for file in settings.yaml kubernetes.yaml docker.yaml; do
                  public="/config/public/$file"
                  private="/config/private/$file"
                  public_default="/tmp/homepage-merge/public-$file"
                  private_default="/tmp/homepage-merge/private-$file"
                  if [ -f "$public" ]; then cp "$public" "$public_default"; else printf '{}\n' > "$public_default"; fi
                  if [ -f "$private" ]; then cp "$private" "$private_default"; else printf '{}\n' > "$private_default"; fi
                  yq ea '. as $item ireduce ({}; . *+ $item)' "$public_default" "$private_default" > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
                for file in custom.css custom.js; do
                  {
                    [ -f "/config/public/$file" ] && cat "/config/public/$file"
                    printf '\n'
                    [ -f "/config/private/$file" ] && cat "/config/private/$file"
                    printf '\n'
                  } > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
              }
              merge_homepage_config
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: public-config
              mountPath: /config/public
              readOnly: true
            - name: private-config
              mountPath: /config/private
              readOnly: true
            - name: merged-config
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.13.1
          imagePullPolicy: IfNotPresent
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: homepage-${branch_slug}.${cluster_domain}
            - name: LOG_TARGETS
              value: stdout
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            tcpSocket:
              port: http
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: http
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: merged-config
              mountPath: /app/config
        - name: config-reloader
          image: mikefarah/yq:4.45.4
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              merge_homepage_config() {
                mkdir -p /app/config /tmp/homepage-merge
                for file in services.yaml bookmarks.yaml widgets.yaml; do
                  public="/config/public/$file"
                  private="/config/private/$file"
                  public_default="/tmp/homepage-merge/public-$file"
                  private_default="/tmp/homepage-merge/private-$file"
                  if [ -f "$public" ]; then cp "$public" "$public_default"; else printf '[]\n' > "$public_default"; fi
                  if [ -f "$private" ]; then cp "$private" "$private_default"; else printf '[]\n' > "$private_default"; fi
                  yq ea '. as $item ireduce ([]; . + ($item // []))' "$public_default" "$private_default" > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
                for file in settings.yaml kubernetes.yaml docker.yaml; do
                  public="/config/public/$file"
                  private="/config/private/$file"
                  public_default="/tmp/homepage-merge/public-$file"
                  private_default="/tmp/homepage-merge/private-$file"
                  if [ -f "$public" ]; then cp "$public" "$public_default"; else printf '{}\n' > "$public_default"; fi
                  if [ -f "$private" ]; then cp "$private" "$private_default"; else printf '{}\n' > "$private_default"; fi
                  yq ea '. as $item ireduce ({}; . *+ $item)' "$public_default" "$private_default" > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
                for file in custom.css custom.js; do
                  {
                    [ -f "/config/public/$file" ] && cat "/config/public/$file"
                    printf '\n'
                    [ -f "/config/private/$file" ] && cat "/config/private/$file"
                    printf '\n'
                  } > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
              }
              while true; do
                merge_homepage_config
                sleep 60
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: public-config
              mountPath: /config/public
              readOnly: true
            - name: private-config
              mountPath: /config/private
              readOnly: true
            - name: merged-config
              mountPath: /app/config
      volumes:
        - name: public-config
          configMap:
            name: homepage-public-config
        - name: private-config
          configMap:
            name: homepage-private-config
            optional: true
        - name: merged-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-${branch_slug}
  namespace: homepage-${branch_slug}
  labels:
    app.kubernetes.io/name: homepage
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: homepage
    homelab.petebeegle.com/branch-slug: ${branch_slug}
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: homepage-${branch_slug}-to-internal-gateway
  namespace: gateway
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: homepage-${branch_slug}
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage-${branch_slug}
  namespace: homepage-${branch_slug}
  labels:
    app.kubernetes.io/name: homepage
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  parentRefs:
    - name: internal
      namespace: gateway
      sectionName: https-gateway
  hostnames:
    - homepage-${branch_slug}.${cluster_domain}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homepage-${branch_slug}
          port: 80
          weight: 1
