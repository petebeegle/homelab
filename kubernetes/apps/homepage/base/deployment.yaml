---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: homepage
      initContainers:
        - name: merge-config
          image: mikefarah/yq:4.45.4
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              merge_homepage_config() {
                mkdir -p /app/config /tmp/homepage-merge
                for file in services.yaml bookmarks.yaml widgets.yaml; do
                  public="/config/public/$file"
                  private="/config/private/$file"
                  public_default="/tmp/homepage-merge/public-$file"
                  private_default="/tmp/homepage-merge/private-$file"
                  if [ -f "$public" ]; then cp "$public" "$public_default"; else printf '[]\n' > "$public_default"; fi
                  if [ -f "$private" ]; then cp "$private" "$private_default"; else printf '[]\n' > "$private_default"; fi
                  yq ea '. as $item ireduce ([]; . + ($item // []))' "$public_default" "$private_default" > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
                for file in settings.yaml kubernetes.yaml docker.yaml; do
                  public="/config/public/$file"
                  private="/config/private/$file"
                  public_default="/tmp/homepage-merge/public-$file"
                  private_default="/tmp/homepage-merge/private-$file"
                  if [ -f "$public" ]; then cp "$public" "$public_default"; else printf '{}\n' > "$public_default"; fi
                  if [ -f "$private" ]; then cp "$private" "$private_default"; else printf '{}\n' > "$private_default"; fi
                  yq ea '. as $item ireduce ({}; . *+ $item)' "$public_default" "$private_default" > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
                for file in custom.css custom.js; do
                  {
                    [ -f "/config/public/$file" ] && cat "/config/public/$file"
                    printf '\n'
                    [ -f "/config/private/$file" ] && cat "/config/private/$file"
                    printf '\n'
                  } > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
              }
              merge_homepage_config
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: public-config
              mountPath: /config/public
              readOnly: true
            - name: private-config
              mountPath: /config/private
              readOnly: true
            - name: merged-config
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.13.1
          imagePullPolicy: IfNotPresent
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: homepage.${cluster_domain}
            - name: LOG_TARGETS
              value: stdout
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            tcpSocket:
              port: http
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: http
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: merged-config
              mountPath: /app/config
        - name: config-reloader
          image: mikefarah/yq:4.45.4
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              merge_homepage_config() {
                mkdir -p /app/config /tmp/homepage-merge
                for file in services.yaml bookmarks.yaml widgets.yaml; do
                  public="/config/public/$file"
                  private="/config/private/$file"
                  public_default="/tmp/homepage-merge/public-$file"
                  private_default="/tmp/homepage-merge/private-$file"
                  if [ -f "$public" ]; then cp "$public" "$public_default"; else printf '[]\n' > "$public_default"; fi
                  if [ -f "$private" ]; then cp "$private" "$private_default"; else printf '[]\n' > "$private_default"; fi
                  yq ea '. as $item ireduce ([]; . + ($item // []))' "$public_default" "$private_default" > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
                for file in settings.yaml kubernetes.yaml docker.yaml; do
                  public="/config/public/$file"
                  private="/config/private/$file"
                  public_default="/tmp/homepage-merge/public-$file"
                  private_default="/tmp/homepage-merge/private-$file"
                  if [ -f "$public" ]; then cp "$public" "$public_default"; else printf '{}\n' > "$public_default"; fi
                  if [ -f "$private" ]; then cp "$private" "$private_default"; else printf '{}\n' > "$private_default"; fi
                  yq ea '. as $item ireduce ({}; . *+ $item)' "$public_default" "$private_default" > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
                for file in custom.css custom.js; do
                  {
                    [ -f "/config/public/$file" ] && cat "/config/public/$file"
                    printf '\n'
                    [ -f "/config/private/$file" ] && cat "/config/private/$file"
                    printf '\n'
                  } > "/app/config/$file.tmp"
                  mv "/app/config/$file.tmp" "/app/config/$file"
                done
              }
              while true; do
                merge_homepage_config
                sleep 60
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: public-config
              mountPath: /config/public
              readOnly: true
            - name: private-config
              mountPath: /config/private
              readOnly: true
            - name: merged-config
              mountPath: /app/config
      volumes:
        - name: public-config
          configMap:
            name: homepage-public-config
        - name: private-config
          configMap:
            name: homepage-private-config
            optional: true
        - name: merged-config
          emptyDir: {}
