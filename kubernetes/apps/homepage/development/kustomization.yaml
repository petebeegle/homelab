---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: homepage
      namespace: homepage
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: homepage
        namespace: homepage
      spec:
        template:
          spec:
            containers:
              - name: homepage
                env:
                  - name: HOMEPAGE_ALLOWED_HOSTS
                    value: homepage.${cluster_domain}
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: homepage
      namespace: homepage
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: homepage.${cluster_domain}
      - op: replace
        path: /spec/parentRefs/0/sectionName
        value: https-gateway
      - op: replace
        path: /spec/parentRefs/1/sectionName
        value: https-gateway
