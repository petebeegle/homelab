---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - pvc.yaml
  - postgres.yaml
  - app.yaml
  - httproute.yaml
  - secret.yaml
configMapGenerator:
  - name: immich-values
    namespace: immich
    files:
      - values.yaml=values.yaml
    options:
      disableNameSuffixHash: true
