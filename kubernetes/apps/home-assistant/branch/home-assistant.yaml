---
apiVersion: v1
kind: Namespace
metadata:
  name: home-assistant-${branch_slug}
  labels:
    name: home-assistant-${branch_slug}
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/part-of: branch-environment
    homelab.petebeegle.com/branch-slug: ${branch_slug}
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-config-${branch_slug}
  namespace: home-assistant-${branch_slug}
  labels:
    app.kubernetes.io/name: home-assistant
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-csi-storage
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant-${branch_slug}
  namespace: home-assistant-${branch_slug}
  labels:
    app.kubernetes.io/name: home-assistant
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
      homelab.petebeegle.com/branch-slug: ${branch_slug}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: home-assistant
        homelab.petebeegle.com/branch-slug: ${branch_slug}
    spec:
      initContainers:
        - name: prepare-storage
          image: alpine:3.22
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - mkdir -p /config/.storage
          volumeMounts:
            - name: config-storage
              mountPath: /config
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:2026.7.0
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: America/New_York
          ports:
            - name: http
              containerPort: 8123
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            failureThreshold: 6
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            failureThreshold: 6
            periodSeconds: 10
          volumeMounts:
            - name: config-storage
              mountPath: /config
            - name: home-assistant-config
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
              readOnly: true
            - name: home-assistant-config
              mountPath: /config/automations.yaml
              subPath: automations.yaml
              readOnly: true
            - name: home-assistant-config
              mountPath: /config/scripts.yaml
              subPath: scripts.yaml
              readOnly: true
            - name: home-assistant-config
              mountPath: /config/scenes.yaml
              subPath: scenes.yaml
              readOnly: true
            - name: home-assistant-packages
              mountPath: /config/packages
              readOnly: true
            - name: home-assistant-storage
              mountPath: /config/.storage/onboarding
              subPath: onboarding
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: config-storage
          persistentVolumeClaim:
            claimName: home-assistant-config-${branch_slug}
        - name: home-assistant-config
          configMap:
            name: home-assistant-${branch_slug}-config
        - name: home-assistant-packages
          configMap:
            name: home-assistant-${branch_slug}-packages
        - name: home-assistant-storage
          configMap:
            name: home-assistant-${branch_slug}-storage
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-${branch_slug}
  namespace: home-assistant-${branch_slug}
  labels:
    app.kubernetes.io/name: home-assistant
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  selector:
    app.kubernetes.io/name: home-assistant
    homelab.petebeegle.com/branch-slug: ${branch_slug}
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: home-assistant-${branch_slug}-to-internal-gateway
  namespace: gateway
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: home-assistant-${branch_slug}
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home-assistant-${branch_slug}
  namespace: home-assistant-${branch_slug}
  labels:
    app.kubernetes.io/name: home-assistant
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  parentRefs:
    - name: internal
      namespace: gateway
      sectionName: https-gateway
  hostnames:
    - homeassistant-${branch_slug}.${cluster_domain}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: home-assistant-${branch_slug}
          port: 80
          weight: 1
