---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  parentRefs:
    - name: internal
      namespace: gateway
      sectionName: https-gateway
    - name: external
      namespace: gateway
      sectionName: https-gateway
  hostnames:
    - homeassistant.${cluster_domain}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: home-assistant
          port: 80
          weight: 1
