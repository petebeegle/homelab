---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: synthetic-smoke
  namespace: synthetics
  labels:
    app: synthetic-smoke
    app.kubernetes.io/name: synthetic-smoke
    app.kubernetes.io/component: synthetic-test
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 6
  jobTemplate:
    metadata:
      labels:
        app: synthetic-smoke
        app.kubernetes.io/name: synthetic-smoke
        app.kubernetes.io/component: synthetic-test
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: synthetic-smoke
            app.kubernetes.io/name: synthetic-smoke
            app.kubernetes.io/component: synthetic-test
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: playwright
              image: mcr.microsoft.com/playwright:v1.60.0-noble
              imagePullPolicy: IfNotPresent
              env:
                - name: CI
                  value: "true"
                - name: HOME
                  value: /tmp
                - name: npm_config_cache
                  value: /workdir/.npm
                - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
                  value: "1"
                - name: SMOKE_BASE_DOMAIN
                  value: "${cluster_domain}"
              command:
                - /bin/bash
                - -ceu
                - |
                  cp -R /smoke-src/. /workdir
                  cd /workdir
                  npm ci --no-audit --no-fund
                  npm run test -- --reporter=list
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: smoke-source
                  mountPath: /smoke-src
                  readOnly: true
                - name: workdir
                  mountPath: /workdir
          volumes:
            - name: smoke-source
              configMap:
                name: synthetic-smoke-source
            - name: workdir
              emptyDir: {}
