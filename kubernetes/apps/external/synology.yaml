---
apiVersion: v1
kind: ConfigMap
metadata:
  name: synology-proxy-nginx
  namespace: external
data:
  nginx.conf: |
    pid /tmp/nginx.pid;

    events {}

    http {
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;

      map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
      }

      server {
        listen 8080;
        server_name synology.petebeegle.com;

        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name synology;
        proxy_ssl_verify off;

        proxy_set_header Host synology.petebeegle.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";

        proxy_redirect https://synology.petebeegle.com:5001/ https://synology.petebeegle.com/;
        proxy_redirect https://192.168.30.99:5001/ https://synology.petebeegle.com/;
        proxy_redirect https://synology:5001/ https://synology.petebeegle.com/;

        sub_filter_once off;
        sub_filter_types text/css application/javascript text/javascript application/json;
        sub_filter "https://synology.petebeegle.com:5001" "https://synology.petebeegle.com";
        sub_filter "https://192.168.30.99:5001" "https://synology.petebeegle.com";

        location / {
          proxy_pass https://192.168.30.99:5001;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synology-proxy
  namespace: external
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: synology-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synology-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: synology-proxy-nginx
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: synology-proxy
  namespace: external
spec:
  selector:
    app.kubernetes.io/name: synology-proxy
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: synology-route
  namespace: external
spec:
  parentRefs:
    - name: internal
      namespace: gateway
      sectionName: synology-https-gateway
  hostnames:
    - synology.petebeegle.com
  rules:
    - backendRefs:
        - name: synology-proxy
          port: 8080
