---
apiVersion: v1
kind: Service
metadata:
  name: synology
  namespace: external
spec:
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: synology
  namespace: external
  labels:
    kubernetes.io/service-name: synology
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 5000
endpoints:
  - addresses:
      - ${nfs_server}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: synology-route
  namespace: external
spec:
  parentRefs:
    - name: internal
      namespace: gateway
      sectionName: synology-https-gateway
  hostnames:
    - synology.petebeegle.com
  rules:
    - backendRefs:
        - name: synology
          port: 5000
