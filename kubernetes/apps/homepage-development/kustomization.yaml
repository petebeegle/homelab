---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../homepage
patches:
  - target:
      version: v1
      kind: ConfigMap
      name: homepage-public-config
      namespace: homepage
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: homepage-public-config
        namespace: homepage
      data:
        settings.yaml: |
          title: Development Home Lab
          description: Development cluster services
          target: _self
          statusStyle: dot
          hideVersion: true
          showStats: false
          layout:
            Development:
              style: row
              columns: 2
        services.yaml: |
          - Development:
              - Homepage:
                  icon: homepage.png
                  href: https://homepage.${cluster_domain}
                  description: Development dashboard
              - Whoami:
                  icon: mdi-test-tube
                  href: https://whoami.${cluster_domain}
                  description: Gateway routing canary
        bookmarks.yaml: |
          - Repositories:
              - Homelab:
                  - abbr: Git
                    href: https://github.com/petebeegle/homelab
        widgets.yaml: |
          - search:
              provider: duckduckgo
              target: _blank
          - datetime:
              text_size: xl
              format:
                dateStyle: long
                timeStyle: short
        kubernetes.yaml: |
          mode: cluster
          ingress: false
          traefik: false
          gateway: true
        docker.yaml: |
          {}
        custom.css: |
          :root {
            --homepage-dashboard-note: "homelab-development-public-config";
          }
        custom.js: |
          // Public Homepage custom JavaScript intentionally left minimal.
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: homepage
      namespace: homepage
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: homepage
        namespace: homepage
      spec:
        template:
          spec:
            containers:
              - name: homepage
                env:
                  - name: HOMEPAGE_ALLOWED_HOSTS
                    value: homepage.${cluster_domain}
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: homepage
      namespace: homepage
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: homepage.${cluster_domain}
      - op: replace
        path: /spec/parentRefs/0/sectionName
        value: https-gateway
      - op: replace
        path: /spec/parentRefs/1/sectionName
        value: https-gateway
