---
apiVersion: v1
kind: Namespace
metadata:
  name: jellyfin-${branch_slug}
  labels:
    name: jellyfin-${branch_slug}
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: branch-environment
    homelab.petebeegle.com/branch-slug: ${branch_slug}
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-${branch_slug}
  namespace: jellyfin-${branch_slug}
  labels:
    app.kubernetes.io/name: jellyfin
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-csi-storage
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jellyfin-${branch_slug}-sso-bootstrap
  namespace: jellyfin-${branch_slug}
  labels:
    app.kubernetes.io/name: jellyfin
    homelab.petebeegle.com/branch-slug: ${branch_slug}
data:
  bootstrap-sso.py: |
    import hashlib
    import os
    import shutil
    import sys
    import tempfile
    import urllib.request
    import zipfile
    import xml.etree.ElementTree as ET
    from pathlib import Path
    from xml.sax.saxutils import escape

    plugin_version = "4.0.0.4"
    plugin_url = "https://github.com/9p4/jellyfin-plugin-sso/releases/download/v4.0.0.4/sso-authentication_4.0.0.4.zip"
    plugin_sha256 = "c09f16ba31059a434ddd7f811e4f9608d4b4c4514cc80a5bf1ca33bee61e1107"
    config_root = Path("/config")
    plugin_dir = config_root / "plugins" / f"SSO Authentication_{plugin_version}"
    plugin_config = config_root / "plugins" / "configurations" / "SSO-Auth.xml"
    branding_config = config_root / "config" / "branding.xml"
    ENCODING_CONFIG = config_root / "config" / "encoding.xml"
    QSV_RENDER_DEVICE = "/dev/dri/renderD128"
    HARDWARE_DECODING_CODECS = ("h264", "hevc", "mpeg2video", "vc1", "vp8", "vp9")
    expected_plugin_files = (
        "SSO-Auth.dll",
        "Duende.IdentityModel.dll",
        "Duende.IdentityModel.OidcClient.dll",
        "meta.json",
    )
    public_url = os.environ["JELLYFIN_PUBLIC_URL"].rstrip("/")
    oid_endpoint = os.environ["JELLYFIN_OIDC_ENDPOINT"]
    client_secret = os.environ["JELLYFIN_OAUTH_CLIENT_SECRET"]

    def plugin_install_complete(path=None):
        plugin_path = plugin_dir if path is None else path
        return plugin_path.is_dir() and all((plugin_path / name).is_file() for name in expected_plugin_files)

    def indent(element, level=0):
        spacing = "\n" + level * "  "
        child_spacing = "\n" + (level + 1) * "  "
        if len(element):
            if not element.text or not element.text.strip():
                element.text = child_spacing
            for child in element:
                indent(child, level + 1)
            if not child.tail or not child.tail.strip():
                child.tail = spacing
        if level and (not element.tail or not element.tail.strip()):
            element.tail = spacing

    def set_text(parent, name, value):
        child = parent.find(name)
        if child is None:
            child = ET.SubElement(parent, name)
        child.text = value
        return child

    def set_bool(parent, name, value):
        set_text(parent, name, "true" if value else "false")

    def set_string_array(parent, name, values):
        existing = parent.find(name)
        if existing is not None:
            parent.remove(existing)
        array = ET.SubElement(parent, name)
        for value in values:
            item = ET.SubElement(array, "string")
            item.text = value
        return array

    def configure_encoding():
        ENCODING_CONFIG.parent.mkdir(parents=True, exist_ok=True)
        if ENCODING_CONFIG.exists():
            root = ET.parse(ENCODING_CONFIG).getroot()
        else:
            root = ET.Element("EncodingOptions")

        set_text(root, "HardwareAccelerationType", "qsv")
        set_text(root, "VaapiDevice", QSV_RENDER_DEVICE)
        set_text(root, "QsvDevice", QSV_RENDER_DEVICE)
        set_bool(root, "EnableHardwareEncoding", True)
        set_bool(root, "EnableDecodingColorDepth10Hevc", True)
        set_bool(root, "EnableDecodingColorDepth10Vp9", True)
        set_bool(root, "PreferSystemNativeHwDecoder", True)
        set_bool(root, "EnableSegmentDeletion", True)
        set_bool(root, "EnableThrottling", True)
        set_text(root, "ThrottleDelaySeconds", "180")
        set_text(root, "SegmentKeepSeconds", "720")
        set_string_array(root, "HardwareDecodingCodecs", HARDWARE_DECODING_CODECS)

        indent(root)
        ET.ElementTree(root).write(ENCODING_CONFIG, encoding="utf-8", xml_declaration=True)

    try:
        plugin_dir.parent.mkdir(parents=True, exist_ok=True)
        if plugin_install_complete():
            print(f"SSO Authentication plugin {plugin_version} already installed; skipping install")
        else:
            with tempfile.TemporaryDirectory() as temp_dir:
                archive = Path(temp_dir) / "sso-authentication.zip"
                with urllib.request.urlopen(plugin_url, timeout=60) as response:
                    archive.write_bytes(response.read())
                if hashlib.sha256(archive.read_bytes()).hexdigest() != plugin_sha256:
                    raise RuntimeError("SSO Authentication plugin checksum mismatch")

                install_parent = plugin_dir.parent
                with tempfile.TemporaryDirectory(
                    prefix=f".{plugin_dir.name}.install-",
                    dir=install_parent,
                ) as staged_dir:
                    staged_plugin_dir = Path(staged_dir) / plugin_dir.name
                    staged_plugin_dir.mkdir()
                    with zipfile.ZipFile(archive) as plugin_zip:
                        plugin_zip.extractall(staged_plugin_dir)

                    if not plugin_install_complete(staged_plugin_dir):
                        missing = [
                            name for name in expected_plugin_files
                            if not (staged_plugin_dir / name).is_file()
                        ]
                        raise RuntimeError(
                            "SSO Authentication plugin archive is incomplete; "
                            f"missing expected files: {', '.join(missing)}"
                        )

                    if plugin_dir.exists():
                        try:
                            shutil.rmtree(plugin_dir)
                        except OSError as exc:
                            raise RuntimeError(
                                "Existing SSO Authentication plugin directory is incomplete "
                                "and could not be replaced safely; stop Jellyfin and retry"
                            ) from exc
                    staged_plugin_dir.rename(plugin_dir)

        plugin_config.parent.mkdir(parents=True, exist_ok=True)
        plugin_config.write_text(f"""<?xml version='1.0' encoding='utf-8'?>
    <PluginConfiguration>
      <SamlConfigs />
      <OidConfigs>
        <item>
          <key><string>authentik</string></key>
          <value>
            <PluginConfiguration>
              <OidEndpoint>{escape(oid_endpoint)}</OidEndpoint>
              <OidClientId>jellyfin</OidClientId>
              <OidSecret>{escape(client_secret)}</OidSecret>
              <Enabled>true</Enabled>
              <EnableAuthorization>true</EnableAuthorization>
              <EnableAllFolders>true</EnableAllFolders>
              <EnabledFolders />
              <AdminRoles><string>Jellyfin Admins</string></AdminRoles>
              <Roles><string>Jellyfin Users</string><string>Jellyfin Admins</string></Roles>
              <EnableFolderRoles>false</EnableFolderRoles>
              <EnableLiveTvRoles>false</EnableLiveTvRoles>
              <EnableLiveTv>true</EnableLiveTv>
              <EnableLiveTvManagement>false</EnableLiveTvManagement>
              <LiveTvRoles />
              <LiveTvManagementRoles />
              <FolderRoleMappings />
              <RoleClaim>groups</RoleClaim>
              <OidScopes><string>groups</string></OidScopes>
              <DefaultProvider />
              <SchemeOverride>https</SchemeOverride>
              <NewPath>true</NewPath>
              <CanonicalLinks />
              <DefaultUsernameClaim>preferred_username</DefaultUsernameClaim>
              <AvatarUrlFormat />
              <DisableHttps>false</DisableHttps>
              <DisablePushedAuthorization>false</DisablePushedAuthorization>
              <DoNotValidateEndpoints>false</DoNotValidateEndpoints>
              <DoNotValidateIssuerName>false</DoNotValidateIssuerName>
              <DoNotLoadProfile>false</DoNotLoadProfile>
            </PluginConfiguration>
          </value>
        </item>
      </OidConfigs>
    </PluginConfiguration>
    """, encoding="utf-8")

        branding_config.parent.mkdir(parents=True, exist_ok=True)
        branding_config.write_text(f"""<?xml version='1.0' encoding='utf-8'?>
    <BrandingOptions>
      <LoginDisclaimer>&lt;form action=&quot;{escape(public_url)}/sso/OID/start/authentik&quot;&gt;
      &lt;button class=&quot;raised block emby-button button-submit&quot;&gt;
        Sign in with SSO
      &lt;/button&gt;
    &lt;/form&gt;</LoginDisclaimer>
      <CustomCss>a.raised.emby-button {{
      padding: 0.9em 1em;
      color: inherit !important;
    }}
    .disclaimerContainer {{
      display: block;
    }}</CustomCss>
      <SplashscreenEnabled>false</SplashscreenEnabled>
    </BrandingOptions>
    """, encoding="utf-8")

        configure_encoding()
    except Exception as exc:
        print(f"Jellyfin branch SSO bootstrap failed: {exc}", file=sys.stderr)
        raise
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jellyfin-${branch_slug}
  namespace: flux-system
  labels:
    app.kubernetes.io/name: jellyfin
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  interval: 12h
  url: https://jellyfin.github.io/jellyfin-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin-${branch_slug}
  namespace: jellyfin-${branch_slug}
  labels:
    app.kubernetes.io/name: jellyfin
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  interval: 5m
  releaseName: jellyfin-${branch_slug}
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: jellyfin
      sourceRef:
        kind: HelmRepository
        name: jellyfin-${branch_slug}
        namespace: flux-system
      version: "3.2.0"
  values:
    fullnameOverride: jellyfin-${branch_slug}
    persistence:
      config:
        enabled: true
        existingClaim: jellyfin-config-${branch_slug}
        storageClass: nfs-csi-storage
      media:
        enabled: false
    nodeSelector:
      homelab.petebeegle.com/jellyfin-igpu: "true"
    resources:
      requests:
        gpu.intel.com/i915: 1
      limits:
        gpu.intel.com/i915: 1
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8096"
        prometheus.io/path: /metrics
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
    startupProbe:
      tcpSocket:
        port: http
      failureThreshold: 60
      periodSeconds: 10
      timeoutSeconds: 5
    livenessProbe:
      httpGet: null
      tcpSocket:
        port: http
      failureThreshold: 6
      periodSeconds: 10
      timeoutSeconds: 5
    readinessProbe:
      httpGet: null
      tcpSocket:
        port: http
      failureThreshold: 6
      periodSeconds: 10
      timeoutSeconds: 5
    extraInitContainers:
      - name: install-sso-auth
        image: python:3.13-alpine
        imagePullPolicy: IfNotPresent
        env:
          - name: JELLYFIN_OAUTH_CLIENT_SECRET
            value: branch-placeholder-not-secret
          - name: JELLYFIN_PUBLIC_URL
            value: https://jellyfin-${branch_slug}.${cluster_domain}
          - name: JELLYFIN_OIDC_ENDPOINT
            value: https://authentik.${cluster_domain}/application/o/jellyfin/.well-known/openid-configuration
        command:
          - python3
          - /opt/jellyfin-sso/bootstrap-sso.py
        volumeMounts:
          - name: config
            mountPath: /config
          - name: jellyfin-sso-bootstrap
            mountPath: /opt/jellyfin-sso
            readOnly: true
    volumes:
      - name: jellyfin-sso-bootstrap
        configMap:
          name: jellyfin-${branch_slug}-sso-bootstrap
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: jellyfin-${branch_slug}
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: jellyfin-${branch_slug}
              spec:
                template:
                  spec:
                    volumes:
                      - name: cache
                        emptyDir:
                          sizeLimit: 40Gi
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: jellyfin-${branch_slug}-to-internal-gateway
  namespace: gateway
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: jellyfin-${branch_slug}
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin-${branch_slug}
  namespace: jellyfin-${branch_slug}
  labels:
    app.kubernetes.io/name: jellyfin
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  parentRefs:
    - name: internal
      namespace: gateway
      sectionName: https-gateway
  hostnames:
    - jellyfin-${branch_slug}.${cluster_domain}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /metrics
      backendRefs:
        - name: jellyfin-${branch_slug}-metrics-deny
          port: 8096
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: jellyfin-${branch_slug}
          port: 8096
          weight: 1
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-${branch_slug}-metrics-deny
  namespace: jellyfin-${branch_slug}
  labels:
    app.kubernetes.io/name: jellyfin
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8096
      targetPort: 8096
