---
apiVersion: v1
kind: Namespace
metadata:
  name: jellyfin-${branch_slug}
  labels:
    name: jellyfin-${branch_slug}
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: branch-environment
    homelab.petebeegle.com/branch-slug: ${branch_slug}
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-${branch_slug}
  namespace: jellyfin-${branch_slug}
  labels:
    app.kubernetes.io/name: jellyfin
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-csi-storage
  resources:
    requests:
      storage: 5Gi
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jellyfin-${branch_slug}
  namespace: flux-system
  labels:
    app.kubernetes.io/name: jellyfin
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  interval: 12h
  url: https://jellyfin.github.io/jellyfin-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin-${branch_slug}
  namespace: jellyfin-${branch_slug}
  labels:
    app.kubernetes.io/name: jellyfin
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  interval: 5m
  releaseName: jellyfin-${branch_slug}
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: jellyfin
      sourceRef:
        kind: HelmRepository
        name: jellyfin-${branch_slug}
        namespace: flux-system
      version: "3.2.0"
  values:
    fullnameOverride: jellyfin-${branch_slug}
    persistence:
      config:
        enabled: true
        existingClaim: jellyfin-config-${branch_slug}
        storageClass: nfs-csi-storage
      media:
        enabled: false
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: jellyfin-${branch_slug}-to-internal-gateway
  namespace: gateway
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: jellyfin-${branch_slug}
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin-${branch_slug}
  namespace: jellyfin-${branch_slug}
  labels:
    app.kubernetes.io/name: jellyfin
    homelab.petebeegle.com/branch-slug: ${branch_slug}
spec:
  parentRefs:
    - name: internal
      namespace: gateway
      sectionName: https-gateway
  hostnames:
    - jellyfin-${branch_slug}.${cluster_domain}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: jellyfin-${branch_slug}
          port: 8096
          weight: 1
