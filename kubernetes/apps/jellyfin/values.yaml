persistence:
  config:
    enabled: true
    existingClaim: jellyfin-config-v2
    storageClass: nfs-csi-storage
  media:
    enabled: false
nodeSelector:
  homelab.petebeegle.com/jellyfin-igpu: "true"
resources:
  requests:
    cpu: 500m
    memory: 2Gi
    gpu.intel.com/i915: 1
  limits:
    cpu: 4000m
    memory: 6Gi
    gpu.intel.com/i915: 1
service:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8096"
    prometheus.io/path: /metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
startupProbe:
  tcpSocket:
    port: http
  failureThreshold: 60
  periodSeconds: 10
  timeoutSeconds: 5
livenessProbe:
  httpGet: null
  tcpSocket:
    port: http
  failureThreshold: 6
  periodSeconds: 10
  timeoutSeconds: 5
readinessProbe:
  httpGet: null
  tcpSocket:
    port: http
  failureThreshold: 6
  periodSeconds: 10
  timeoutSeconds: 5
extraInitContainers:
  - name: install-sso-auth
    image: python:3.14-alpine
    imagePullPolicy: IfNotPresent
    env:
      - name: JELLYFIN_OAUTH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: jellyfin-secrets
            key: JELLYFIN_OAUTH_CLIENT_SECRET
      - name: JELLYFIN_PUBLIC_URL
        value: https://jellyfin.${cluster_domain}
      - name: JELLYFIN_OIDC_ENDPOINT
        value: https://authentik.${cluster_domain}/application/o/jellyfin/.well-known/openid-configuration
    command:
      - python3
      - /opt/jellyfin-sso/bootstrap-sso.py
    volumeMounts:
      - name: config
        mountPath: /config
      - name: jellyfin-sso-bootstrap
        mountPath: /opt/jellyfin-sso
        readOnly: true
volumes:
  - name: custom-media
    nfs:
      server: ${nfs_server}
      path: /volume1/Media/Jellyfin
  - name: jellyfin-sso-bootstrap
    configMap:
      name: jellyfin-sso-bootstrap
volumeMounts:
  - name: custom-media
    mountPath: /custom-media
