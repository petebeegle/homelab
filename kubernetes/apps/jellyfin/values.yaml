persistence:
  config:
    enabled: true
    existingClaim: jellyfin-config-v2
    storageClass: nfs-csi-storage
  media:
    enabled: false
volumes:
  - name: custom-media
    nfs:
      server: ${nfs_server}
      path: /volume1/Media/Jellyfin
volumeMounts:
  - name: custom-media
    mountPath: /custom-media
